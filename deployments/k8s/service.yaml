apiVersion: v1
kind: Service
metadata:
  name: ai-router-service
  namespace: default
  labels:
    app: ai-router
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8080"
spec:
  selector:
    app: ai-router
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      name: http
  type: ClusterIP
