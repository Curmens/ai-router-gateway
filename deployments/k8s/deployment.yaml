apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-router-deployment
  namespace: default
  labels:
    app: ai-router
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-router
  template:
    metadata:
      labels:
        app: ai-router
    spec:
      containers:
        - name: ai-router
          image: ai-router:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: PROVIDERS_OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-router-secrets
                  key: openai-api-key
            - name: PROVIDERS_GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ai-router-secrets
                  key: gemini-api-key
          volumeMounts:
            - name: config-volume
              mountPath: /app/configs
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            limits:
              cpu: "1"
              memory: 1Gi
            requests:
              cpu: 250m
              memory: 256Mi
      volumes:
        - name: config-volume
          configMap:
            name: ai-router-config
