server:
  port: 8080
  api_keys:
    - key: "sk-router-admin-12345"
      role: "admin"
      rate_limit: 1000 # requests per minute
    - key: "sk-router-dev-67890"
      role: "developer"
      rate_limit: 100
    - key: "sk-router-user-54321"
      role: "user"
      rate_limit: 10

database:
  url: "postgres://postgres:postgres@localhost:5432/airouter?sslmode=disable"
  max_connections: 20
  min_connections: 2

redis:
  host: "localhost:6379"
  password: ""
  db: 0
  cache_ttl_seconds: 3600

providers:
  openai:
    enabled: true
    api_key: "YOUR_OPENAI_API_KEY"
    base_url: "https://api.openai.com/v1"
    models:
      - name: "gpt-4o"
        cost_per_1k_prompt: 0.005
        cost_per_1k_completion: 0.015
      - name: "gpt-4o-mini"
        cost_per_1k_prompt: 0.00015
        cost_per_1k_completion: 0.0006
  gemini:
    enabled: true
    api_key: "YOUR_GEMINI_API_KEY"
    base_url: "https://generativelanguage.googleapis.com/v1beta"
    models:
      - name: "gemini-2.5-pro"
        cost_per_1k_prompt: 0.00125
        cost_per_1k_completion: 0.005
      - name: "gemini-2.5-flash"
        cost_per_1k_prompt: 0.000075
        cost_per_1k_completion: 0.0003
  ollama:
    enabled: true
    base_url: "http://localhost:11434"
    classifier_model: "qwen3:4b"
    models:
      - name: "qwen3:8b"
        cost_per_1k_prompt: 0.0
        cost_per_1k_completion: 0.0
      - name: "llama3:8b"
        cost_per_1k_prompt: 0.0
        cost_per_1k_completion: 0.0

routing:
  default_model: "qwen3:8b"
  auto_routing:
    enabled: true
    classifier_threshold: 0.85
  failover:
    max_retries: 3
    retry_backoff_ms: 200
    circuit_breaker:
      max_failures: 5
      timeout_seconds: 30
    chains:
      default: ["ollama", "gemini", "openai"]
      openai: ["openai", "gemini", "ollama"]
      gemini: ["gemini", "openai", "ollama"]
      ollama: ["ollama", "gemini", "openai"]

telemetry:
  prometheus:
    enabled: true
    path: "/metrics"
  opentelemetry:
    enabled: false
    collector_url: "localhost:4317"
